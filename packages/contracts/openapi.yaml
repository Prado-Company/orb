openapi: 3.1.0
info:
  title: Orb API
  version: 0.1.0
  summary: REST JSON contract for Orb web v1 and future mobile clients.
servers:
  - url: http://localhost:3000
security:
  - cookie_session: []
  - bearer_session: []
paths:
  /api/v1/health:
    get:
      summary: Health check for local API bootstrap.
      responses:
        "200":
          description: API is reachable.
          content:
            application/json:
              schema:
                type: object
                required: [status, service, version, correlation_id]
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  version:
                    type: integer
                  correlation_id:
                    type: string
  /api/v1/auth/sign_up:
    post:
      summary: Create the initial web account and opaque session.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: object
                  required: [name, email, password]
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      writeOnly: true
                      minLength: 12
                      pattern: "^(?=.*[A-Za-z])(?=.*\\d).{12,}$"
                      description: Must contain at least 12 characters, with letters and numbers. Common weak passwords are rejected server-side.
                    pronouns:
                      type: [string, "null"]
                    timezone:
                      type: string
                      default: America/Bahia
                    locale:
                      type: string
                      default: pt-BR
      responses:
        "201":
          description: Account and session created.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HttpOnly `_orb_session` opaque session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "400":
          $ref: "#/components/responses/InvalidSource"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/auth/login:
    post:
      summary: Create an opaque session for an existing user.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session]
              properties:
                session:
                  type: object
                  required: [email, password]
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      writeOnly: true
      responses:
        "200":
          description: Session created.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          $ref: "#/components/responses/AuthenticationFailed"
  /api/v1/auth/session:
    get:
      summary: Return the current authenticated session.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Current session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
    delete:
      summary: Revoke the current opaque session.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "204":
          description: Session revoked.
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
  /api/v1/energy/current:
    get:
      summary: Return the current individual energy outside organization context.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - name: X-Orb-Organization-Id
          in: header
          required: false
          schema:
            type: string
          description: When present, individual sensitive energy is blocked; Teams aggregates require group size >= 3.
      responses:
        "200":
          description: Current individual energy.
          content:
            application/json:
              schema:
                type: object
                required: [version, energy, correlation_id]
                properties:
                  version:
                    type: integer
                    const: 1
                  energy:
                    $ref: "#/components/schemas/Energy"
                  correlation_id:
                    type: string
        "403":
          $ref: "#/components/responses/SensitiveIndividualDataBlocked"
  /api/v1/onboarding/complete:
    post:
      summary: Complete summarized onboarding.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingCompleteRequest"
      responses:
        "201":
          description: Onboarding completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingCompleteResponse"
        "400":
          $ref: "#/components/responses/InvalidSource"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/onboarding/skip:
    post:
      summary: Skip onboarding with safe defaults.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingSkipRequest"
      responses:
        "201":
          description: Onboarding skipped.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSkipResponse"
        "400":
          $ref: "#/components/responses/InvalidSource"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/tasks:
    get:
      summary: List authenticated user tasks.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Task list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
    post:
      summary: Create a task for the authenticated user.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskWriteRequest"
      responses:
        "201":
          description: Task created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Show one task owned by the authenticated user.
      responses:
        "200":
          description: Task found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Partially update one task.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskPatchRequest"
      responses:
        "200":
          description: Task updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      summary: Soft delete one task.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Task hidden from active views.
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/events:
    get:
      summary: List authenticated user events.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - name: at
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Optional timestamp used to calculate available_window_minutes until the next active event.
      responses:
        "200":
          description: Event list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
    post:
      summary: Create an anchored event.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventWriteRequest"
      responses:
        "201":
          description: Event created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "422":
          $ref: "#/components/responses/ValidationError"
  /api/v1/events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Show one event owned by the authenticated user.
      responses:
        "200":
          description: Event found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update one event.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: external_calendar_write_consent
          in: query
          required: false
          schema:
            type: boolean
          description: Explicit consent required before mutating external-origin events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventPatchRequest"
      responses:
        "200":
          description: Event updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/ExternalCalendarWriteRequiresConsent"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      summary: Delete or hide one event when policy allows it.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: external_calendar_write_consent
          in: query
          required: false
          schema:
            type: boolean
          description: Explicit consent required before mutating external-origin events.
      responses:
        "204":
          description: Event removed from active views.
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/ExternalCalendarWriteRequiresConsent"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/events/{id}/external_origin:
    patch:
      summary: Update external-origin metadata without calendar write access.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: External origin updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "403":
          $ref: "#/components/responses/ExternalCalendarWriteRequiresConsent"
  /api/v1/history:
    get:
      summary: Return the authenticated user's short timeline.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: History timeline filtered by entitlement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
  /api/v1/check_ins:
    get:
      summary: List check-ins visible to the authenticated user.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Check-in list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInListResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
    post:
      summary: Create a check-in prompt.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInCreateRequest"
      responses:
        "201":
          description: Check-in created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInCreateResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "429":
          $ref: "#/components/responses/DailyCheckInLimitReached"
  /api/v1/check_ins/{check_in_id}/responses:
    post:
      summary: Respond to a check-in and recalibrate energy on the server.
      parameters:
        - name: check_in_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInResponseRequest"
      responses:
        "200":
          description: Check-in softly postponed without recalibration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponsePayload"
        "201":
          description: Response recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponsePayload"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/CheckInAlreadyAnswered"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/DailyCheckInLimitReached"
  /api/v1/suggestions/next_action:
    post:
      summary: Ask the deterministic engine for one next action.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Next action suggestion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextAction"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
  /api/v1/suggestions/{suggestion_id}/actions:
    post:
      summary: Record a human action on a deterministic suggestion.
      parameters:
        - name: suggestion_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestionActionRequest"
      responses:
        "200":
          description: Suggestion action recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionActionResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/interventions:
    get:
      summary: List self-regulation interventions.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Intervention list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionListResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
    post:
      summary: Start an intervention.
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterventionStartRequest"
      responses:
        "201":
          description: Intervention started.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
  /api/v1/interventions/{intervention_id}:
    patch:
      summary: Finish an intervention and recalibrate energy.
      parameters:
        - name: intervention_id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/OrbSource"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterventionFinishRequest"
      responses:
        "200":
          description: Intervention finished.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterventionResponse"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    cookie_session:
      type: apiKey
      in: cookie
      name: _orb_session
    bearer_session:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
      description: Client-provided correlation_id; server generates one when absent.
    OrbSource:
      name: X-Orb-Source
      in: header
      required: false
      schema:
        type: string
        enum: [web, android, ios]
      description: Public product surface that initiated the request; admin, job and integration sources are server-only.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Required by critical mutations before production.
  responses:
    AuthenticationRequired:
      description: User session is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AuthenticationFailed:
      description: Email or password is invalid; credentials are never echoed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InvalidSource:
      description: Source header is not supported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Request is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    IdempotencyConflict:
      description: Idempotency key was already used with a different onboarding payload.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource is not visible to this user.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    SensitiveIndividualDataBlocked:
      description: Individual sensitive data is not available in organization context.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ExternalCalendarWriteRequiresConsent:
      description: External calendar write requires explicit user consent.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    DailyCheckInLimitReached:
      description: Daily check-in limit was enforced by the server.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    CheckInAlreadyAnswered:
      description: Check-in responses are immutable after the first answer.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Source:
      type: string
      enum: [web, android, ios, admin, job, integration]
    PrivacyLevel:
      type: string
      enum: [publico, interno, sensivel, agregado, financeiro]
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, correlation_id]
          properties:
            code:
              type: string
              pattern: "^[a-z0-9_]+$"
              example: authentication_required
            message:
              type: string
              example: Entre na sua conta para continuar.
            details:
              type: array
              items:
                type: object
                additionalProperties: true
            correlation_id:
              type: string
              example: cor_01hz7s8q4v9y6z2m0k7a1b3c5d
    User:
      type: object
      required: [version, id, nome, email, timezone, idioma, plano_atual, status_conta, onboarding, privacy_level]
      properties:
        version:
          type: integer
          const: 1
        id:
          type: string
        nome:
          type: string
        email:
          type: string
          format: email
        pronomes:
          type: [string, "null"]
        timezone:
          type: string
        idioma:
          type: string
        plano_atual:
          type: string
          enum: [free, pro, teams]
        status_conta:
          type: string
          enum: [ativa, suspensa, soft_delete_aplicado, deletada]
        onboarding:
          $ref: "#/components/schemas/OnboardingSessionState"
        privacy_level:
          $ref: "#/components/schemas/PrivacyLevel"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthSessionResponse:
      type: object
      required: [version, user, session, correlation_id, privacy_level]
      properties:
        version:
          type: integer
          const: 1
        user:
          $ref: "#/components/schemas/User"
        session:
          type: object
          required: [authenticated, transport, expires_at, source]
          properties:
            authenticated:
              type: boolean
              const: true
            transport:
              type: string
              enum: [cookie]
            expires_at:
              type: string
              format: date-time
            source:
              $ref: "#/components/schemas/Source"
        correlation_id:
          type: string
        privacy_level:
          $ref: "#/components/schemas/PrivacyLevel"
    OnboardingSessionState:
      type: object
      required: [state, resume_available]
      properties:
        state:
          type: string
          enum: [nao_iniciado, em_andamento, pulado, concluido, revisao_solicitada]
        current_step:
          type: [integer, "null"]
          minimum: 1
        total_steps:
          type: [integer, "null"]
          minimum: 1
        resume_available:
          type: boolean
    OnboardingCompleteRequest:
      type: object
      required: [version, flow_variant, started_at, completed_at, profile_inputs]
      properties:
        version:
          type: integer
          const: 1
        flow_variant:
          type: string
          enum: [resumido]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        profile_inputs:
          $ref: "#/components/schemas/OnboardingProfileInputs"
        skipped_sensitive_fields:
          type: boolean
          description: True when optional sensitive fields, such as neurodivergence, were not declared.
        first_action_requested:
          type: boolean
          default: true
    OnboardingSkipRequest:
      type: object
      required: [version, occurred_at]
      properties:
        version:
          type: integer
          const: 1
        occurred_at:
          type: string
          format: date-time
        reason:
          type: string
          enum: [baixa_energia, explorar_primeiro, sem_tempo, prefiro_responder_depois]
