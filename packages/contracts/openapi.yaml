    Intervention:
      type: object
      required: [version, id, usuario_id, tipo, duracao_prevista_minutos, inicio, source, privacy_level]
      properties:
        version:
          type: integer
          const: 1
        id:
          type: string
        usuario_id:
          type: string
        tipo:
          type: string
          enum: [respiracao_guiada, pausa_curta]
        gatilho:
          type: [string, "null"]
        duracao_prevista_minutos:
          type: integer
          minimum: 1
        inicio:
          type: string
          format: date-time
        fim:
          type: [string, "null"]
          format: date-time
        efeito_estimado:
          type: [string, "null"]
        feedback:
          type: [string, "null"]
        source:
          $ref: "#/components/schemas/Source"
        privacy_level:
          $ref: "#/components/schemas/PrivacyLevel"
    InterventionStartRequest:
      type: object
      properties:
        intervention:
          type: object
          properties:
            tipo:
              type: string
              enum: [respiracao_guiada, pausa_curta]
            gatilho:
              type: string
            duracao_prevista_minutos:
              type: integer
              minimum: 1
    InterventionFinishRequest:
      type: object
      properties:
        intervention:
          type: object
          properties:
            feedback:
              type: string
              maxLength: 120
    InterventionListResponse:
      type: object
      required: [version, interventions, correlation_id, privacy_level]
      properties:
        version:
          type: integer
          const: 1
        interventions:
          type: array
          items:
            $ref: "#/components/schemas/Intervention"
        correlation_id:
          type: string
        privacy_level:
          $ref: "#/components/schemas/PrivacyLevel"
    InterventionResponse:
      type: object
      required: [version, intervention, events, correlation_id, privacy_level]
      properties:
        version:
          type: integer
          const: 1
        intervention:
          $ref: "#/components/schemas/Intervention"
        energy:
          $ref: "#/components/schemas/Energy"
        events:
          type: array
          items:
            $ref: "#/components/schemas/DomainEvent"
        correlation_id:
          type: string
        privacy_level:
          $ref: "#/components/schemas/PrivacyLevel"
    ResourceRef:
      type: object
      required: [type, id]
      properties:
        type:
          type: string
        id:
          type: string
    DomainEvent:
      type: object
      required: [version, event_id, event_type, occurred_at, actor, resource, source, correlation_id, privacy_level, metadata_minima]
      properties:
        version:
          type: integer
          const: 1
        event_id:
          type: string
        event_type:
          type: string
          pattern: "^[a-z0-9_]+$"
        occurred_at:
          type: string
          format: date-time
        actor:
          type: object
          required: [type, id]
          properties:
            type:
              type: string
              enum: [usuario, admin, job, integration, system]
            id:
              type: string
        resource:
          $ref: "#/components/schemas/ResourceRef"
        source:
          $ref: "#/components/schemas/Source"
        correlation_id:
          type: string
        privacy_level:
          $ref: "#/components/schemas/PrivacyLevel"
        metadata_minima:
          type: object
          additionalProperties:
            type: [string, number, boolean, "null"]
